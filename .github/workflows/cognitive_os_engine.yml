name: Cognitive OS Engine

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 * * * *' # Run every hour

jobs:
  run-cognition:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50 # Need history for git sensor

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Perception & Consolidation (Founder Trial Daemon)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python mvp/single_pass_daemon.py
          python mvp/export_static_api.py

      - name: Commit and Push Updated Memory Graph
        run: |
          git config --global user.name 'Cognitive OS Engine'
          git config --global user.email 'cognitive-os@automation.local'
          git add public/api/*.json
          git add memory_db.sqlite
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update memory graph API [skip ci]" && git push)

      - name: Trigger Render Auto-Deploy
        if: env.RENDER_DEPLOY_HOOK != ''
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          echo "Triggering Render deployment..."
          curl -X POST $RENDER_DEPLOY_HOOK
