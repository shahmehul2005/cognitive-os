<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Memory - Architecture Log</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        :root {
            --bg-base: #050505;
            --panel-bg: rgba(15, 15, 17, 0.6);
            --border-glow: rgba(99, 102, 241, 0.2);
            --cyan: #00f0ff;
            --violet: #b53cff;
            --rose: #ff2a6d;
            --emerald: #05d59e;
            --text-main: #f8fafc;
            --text-muted: #8b949e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Full Screen Graph Canvas */
        #graph-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            background: radial-gradient(circle at 50% 50%, #111116 0%, var(--bg-base) 100%);
        }

        /* Glass Panels */
        .glass-panel {
            position: relative;
            z-index: 10;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 0 0 1px var(--border-glow);
            display: flex;
            flex-direction: column;
        }

        /* Sidebar - Cognitive Health */
        #sidebar-left {
            position: absolute;
            left: 2rem;
            top: 2rem;
            bottom: 2rem;
            width: 360px;
            padding: 2rem;
            display: flex;
            gap: 2rem;
        }

        /* Sidebar - Logs */
        #sidebar-right {
            position: absolute;
            right: 2rem;
            top: 2rem;
            bottom: 2rem;
            width: 400px;
            padding: 1.5rem;
            gap: 1.5rem;
        }

        /* Typography */
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            background: linear-gradient(135deg, #ffffff 0%, var(--cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        /* Metrics */
        .metric-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .metric-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            padding: 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            border-left: 2px solid var(--violet);
            transition: all 0.3s ease;
        }

        .metric-item:hover {
            background: rgba(255,255,255,0.03);
            border-left-color: var(--cyan);
            transform: translateX(5px);
        }

        .metric-item.cyan { border-left-color: var(--cyan); }
        .metric-item.emerald { border-left-color: var(--emerald); }

        .metric-val {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
        }

        .metric-lbl {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
        }

        /* Logs Lists */
        .log-container {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding-right: 0.5rem;
        }

        .log-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 1rem;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .log-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 2px;
            height: 100%;
            background: var(--violet);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .log-item:hover {
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .log-item:hover::before {
            opacity: 1;
        }

        .log-text {
            font-size: 0.95rem;
            color: #e2e8f0;
            line-height: 1.4;
            margin-bottom: 0.5rem;
        }

        .log-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Badges */
        .badges {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .badge {
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.intent { background: rgba(0, 240, 255, 0.1); color: var(--cyan); }
        .badge.sentiment { background: rgba(181, 60, 255, 0.1); color: var(--violet); }
        .badge.decision { background: rgba(255, 42, 109, 0.1); color: var(--rose); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

        /* Live Status Indicator */
        .live-status {
            position: absolute;
            top: 2rem;
            right: 2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 20;
            background: rgba(0,0,0,0.5);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid rgba(5, 213, 158, 0.3);
            color: var(--emerald);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--emerald);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--emerald);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        /* SVG Tooltip */
        #tooltip {
            position: absolute;
            opacity: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            pointer-events: none;
            font-size: 0.85rem;
            z-index: 50;
            transition: opacity 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <!-- Background Graph Canvas -->
    <div id="graph-container"></div>
    <div id="tooltip"></div>

    <!-- Live Status Indicator -->
    <div class="live-status">
        <div class="pulse-dot"></div>
        System Active
    </div>

    <!-- Left Sidebar: Architecture Identity -->
    <div id="sidebar-left" class="glass-panel">
        <div>
            <h1>Smart Memory</h1>
            <div class="subtitle">Automated Architecture Decision Log</div>
        </div>

        <div style="flex-grow: 1;">
            <h3>📊 Architecture Overview</h3>
            <div class="metric-group">
                <div class="metric-item">
                    <span class="metric-val" id="val-semantic">0</span>
                    <span class="metric-lbl">Active Constraints</span>
                </div>
                <div class="metric-item cyan">
                    <span class="metric-val" id="val-episodic">0</span>
                    <span class="metric-lbl">Technical Commits</span>
                </div>
                <div class="metric-item emerald">
                    <span class="metric-val" id="val-compression">0%</span>
                    <span class="metric-lbl">Decision Compliance</span>
                </div>
            </div>
        </div>

        <div style="margin-top: auto; font-size: 0.75rem; color: var(--text-muted); text-align: center;">
            ADR Engine v1.0.0 • Connected
        </div>
    </div>

    <!-- Right Sidebar: The Stream (Decisions + Episodes) -->
    <div id="sidebar-right" class="glass-panel">
        
        <div style="flex: 1; display: flex; flex-direction: column; overflow: hidden; margin-bottom: 1rem;">
            <h3>⚖️ Architecture Decisions (ADRs)</h3>
            <div class="log-container" id="list-decisions">
                <div style="text-align: center; color: var(--text-muted); margin-top: 2rem; font-size: 0.9rem;">No ADRs recorded.</div>
            </div>
        </div>

        <div style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
            <h3>💻 Engineering Context Stream</h3>
            <div class="log-container" id="list-episodes">
                <div style="text-align: center; color: var(--text-muted); margin-top: 2rem; font-size: 0.9rem;">No streams recorded.</div>
            </div>
        </div>

    </div>

    <script>
        // API Fetching Logic
        async function loadData() {
            try {
                const [metricsRes, decisionsRes, memoryRes] = await Promise.all([
                    fetch('api/metrics.json'),
                    fetch('api/decisions.json'),
                    fetch('api/memory.json')
                ]);

                const metrics = await metricsRes.json();
                const decisions = await decisionsRes.json();
                const memory = await memoryRes.json();

                updateMetrics(metrics);
                updateDecisions(decisions);
                updateEpisodes(memory.nodes);
                renderD3Graph(memory.nodes, memory.edges);

            } catch (err) {
                console.error("Failed to fetch OS state:", err);
            }
        }

        function updateMetrics(data) {
            document.getElementById('val-semantic').innerText = data.semantic_count || 0;
            document.getElementById('val-episodic').innerText = data.episodic_count || 0;
            document.getElementById('val-compression').innerText = Math.round((data.compression_ratio || 0) * 100) + '%';
        }

        function updateDecisions(data) {
            const list = document.getElementById('list-decisions');
            if (!data || data.length === 0) return;
            
            list.innerHTML = '';
            data.forEach(item => {
                let content = item.content;
                try { content = JSON.parse(item.content); } catch (e) {}

                let targetState = content.target_state || "Unknown Goal";
                let rec = content.recommendation || content.text || (typeof content === 'string' ? content : "Decision Log");
                const timeStr = new Date(item.timestamp * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                list.innerHTML += `
                    <div class="log-item" style="border-left-color: var(--rose);">
                        <div class="log-text" style="font-weight: 500;">Target: ${targetState}</div>
                        <div class="log-text" style="color: var(--text-muted); font-size: 0.85rem;">Decision: ${rec}</div>
                        <div class="log-meta">
                            <span class="badge decision">DECISION</span>
                            <span>${timeStr}</span>
                        </div>
                    </div>
                `;
            });
        }

        function updateEpisodes(nodes) {
            const list = document.getElementById('list-episodes');
            const episodes = nodes.filter(n => n.type === 'EPISODIC').sort((a,b) => b.created_at - a.created_at);
            
            if (episodes.length === 0) return;

            list.innerHTML = '';
            episodes.forEach(ep => {
                let content = ep.content;
                try { content = JSON.parse(ep.content); } catch (e) {}

                let text = content.text || (typeof content === 'string' ? content : "Unknown Log");
                const timeStr = new Date(ep.created_at * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                let badges = '';
                if (content.intent) badges += `<span class="badge intent">${content.intent}</span>`;
                if (content.sentiment) badges += `<span class="badge sentiment">${content.sentiment}</span>`;

                list.innerHTML += `
                    <div class="log-item">
                        <div class="log-text">${text}</div>
                        <div class="log-meta">
                            <div class="badges">${badges}</div>
                            <span>${timeStr}</span>
                        </div>
                    </div>
                `;
            });
        }

        // --- D3.js Force Directed Graph ---
        let simulation, svg, link, node, labels;

        function renderD3Graph(nodesData, edgesData) {
            const container = document.getElementById('graph-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            // Clear previous SVG
            d3.select("#graph-container").selectAll("svg").remove();

            if (nodesData.length === 0) return;

            // Process Nodes & Edges
            const nodes = nodesData.map(d => {
                let label = d.id;
                try {
                    let c = JSON.parse(d.content);
                    label = c.text || c.name || c.subject || d.id;
                } catch(e) {
                    label = d.content.substring(0, 30) || d.id;
                }
                return Object.assign({}, d, {label: label});
            });

            const nodeIds = new Set(nodes.map(d => d.id));
            const links = edgesData.filter(d => nodeIds.has(d.source) && nodeIds.has(d.target))
                                   .map(d => Object.assign({}, d));

            // Set up D3 SVG
            svg = d3.select("#graph-container")
                .append("svg")
                .attr("width", width)
                .attr("height", height)
                .call(d3.zoom().scaleExtent([0.3, 3]).on("zoom", (event) => {
                    svgGroup.attr("transform", event.transform);
                }));

            const svgGroup = svg.append("g");

            // Physics Force Simulation
            simulation = d3.forceSimulation(nodes)
                .force("link", d3.forceLink(links).id(d => d.id).distance(150))
                .force("charge", d3.forceManyBody().strength(-800))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collide", d3.forceCollide().radius(40));

            // Draw Links
            link = svgGroup.append("g")
                .selectAll("line")
                .data(links)
                .join("line")
                .attr("stroke", "rgba(255, 255, 255, 0.1)")
                .attr("stroke-width", 1.5);

            // Link Labels
            const linkLabels = svgGroup.append("g")
                .selectAll("text")
                .data(links)
                .join("text")
                .text(d => d.relation_type)
                .attr("font-size", "10px")
                .attr("fill", "rgba(255,255,255,0.3)")
                .attr("text-anchor", "middle");

            // Draw Nodes
            node = svgGroup.append("g")
                .selectAll("g")
                .data(nodes)
                .join("g")
                .call(drag(simulation));

            // Tooltip logic
            const tooltip = d3.select("#tooltip");

            // Node Circles
            node.append("circle")
                .attr("r", d => d.type === 'DECISION' ? 18 : 12)
                .attr("fill", "#0c0f1d")
                .attr("stroke", d => {
                    if (d.type === 'EPISODIC') return "var(--cyan)";
                    if (d.type === 'DECISION') return "var(--rose)";
                    return "var(--violet)";
                })
                .attr("stroke-width", 3)
                .on("mouseover", function(event, d) {
                    d3.select(this).attr("stroke-width", 5).style("filter", "drop-shadow(0 0 10px currentColor)");
                    tooltip.transition().duration(200).style("opacity", 1);
                    tooltip.html(`<strong>[${d.type}]</strong><br/>${d.content.substring(0,100)}...<br/><br/><span style="color:#8b949e">Confidence: ${(d.confidence*100).toFixed(0)}%</span>`)
                        .style("left", (event.pageX + 15) + "px")
                        .style("top", (event.pageY - 28) + "px");
                })
                .on("mouseout", function(event, d) {
                    d3.select(this).attr("stroke-width", 3).style("filter", "none");
                    tooltip.transition().duration(500).style("opacity", 0);
                });

            // Node Labels
            node.append("text")
                .text(d => d.label.length > 20 ? d.label.substring(0, 18) + '...' : d.label)
                .attr("x", 0)
                .attr("y", 25)
                .attr("text-anchor", "middle")
                .attr("fill", "var(--text-main)")
                .attr("font-size", "11px")
                .style("text-shadow", "0 2px 4px rgba(0,0,0,0.8)");

            // Simulation Tick
            simulation.on("tick", () => {
                link
                    .attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);

                linkLabels
                    .attr("x", d => (d.source.x + d.target.x) / 2)
                    .attr("y", d => (d.source.y + d.target.y) / 2 - 5);

                node
                    .attr("transform", d => `translate(${d.x}, ${d.y})`);
            });
        }

        // D3 Drag Behavior
        function drag(simulation) {
            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }
            
            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }
            
            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }
            
            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }

        // Initialize and poll
        loadData();
        setInterval(loadData, 15000); // Poll every 15s

        // Handle window resize for D3
        window.addEventListener('resize', () => {
            if(simulation) {
                const container = document.getElementById('graph-container');
                simulation.force("center", d3.forceCenter(container.clientWidth / 2, container.clientHeight / 2));
                simulation.alpha(0.3).restart();
            }
        });
    </script>
</body>
</html>
